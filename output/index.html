<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* 優しい色合いと、見やすい大きな文字のデザイン */
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            --shadow-color: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* レベルと進捗のヘッダー */
        .header-info {
            background-color: #ebf5fb;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-badge {
            background-color: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #34495e;
        }

        /* ゲージメーター */
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: #d6dbdf;
            border-radius: 6px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--success-color);
            transition: width 0.5s ease-out;
        }

        /* リハビリカードのスタイル */
        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        /* イラスト表示エリア */
        .illustration-container {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }

        .emoji-display {
            font-size: 8rem;
            line-height: 1;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .image-display {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* マイクボタンのデザイン */
        .mic-button {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 2.2rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }

        .mic-button:hover {
            transform: scale(1.05);
            background-color: #2980b9;
        }

        .mic-button:active {
            transform: scale(0.95);
        }

        /* 音声認識中のアニメーション */
        .mic-button.listening {
            background-color: var(--danger-color);
            box-shadow: 0 0 0 15px rgba(231, 76, 60, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .status-message {
            font-size: 1.1rem;
            min-height: 1.5rem;
            margin: 8px 0;
            color: #7f8c8d;
            font-weight: 500;
        }

        /* 認識された言葉の表示 */
        .recognized-word {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            background-color: #ecf0f1;
            padding: 8px 20px;
            border-radius: 12px;
            display: inline-block;
            margin: 5px 0;
            min-width: 150px;
            min-height: 1.8rem;
        }

        /* 結果表示 */
        .result-container {
            font-size: 2rem;
            font-weight: bold;
            min-height: 2.5rem;
            margin: 10px 0;
        }

        .result-success {
            color: var(--success-color);
            animation: popIn 0.3s ease;
        }

        .result-info {
            color: var(--primary-color);
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ヒント表示エリア */
        .hint-card {
            background-color: #fef9e7;
            border: 2px dashed #f5b041;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }

        .hint-title {
            font-weight: bold;
            color: #d35400;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .hint-content {
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: #e67e22;
            font-weight: bold;
        }

        /* 操作ボタン */
        .action-button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background-color: var(--success-color);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            margin-top: 10px;
            display: none;
            transition: all 0.2s ease;
        }

        .action-button:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        /* パスボタンのデザイン */
        .pass-button {
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #bdc3c7;
            border-radius: 12px;
            background-color: #ffffff;
            color: #7f8c8d;
            cursor: pointer;
            margin-top: 10px;
            display: none;
            transition: all 0.2s ease;
        }

        .pass-button:hover {
            background-color: #f2f3f4;
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        /* 音声再生ボタンの補助 */
        .speak-button {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5rem;
            cursor: pointer;
            vertical-align: middle;
            margin-left: 10px;
        }

        .speak-button:hover {
            color: #2980b9;
        }

        /* レベルアップ時のお祝い画面 */
        .level-up-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 24px;
        }

        .level-up-modal.show {
            transform: translateY(0);
        }

        .level-up-title {
            font-size: 2.2rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .level-up-text {
            font-size: 1.3rem;
            color: var(--text-color);
            margin-bottom: 25px;
            padding: 0 20px;
            line-height: 1.5;
        }
    </style>
</head>

</div>

            { emoji: '🎈', answers: ['ふうせん', '風船', 'フウセン'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「ふ」', hint3: '２文字目は「う」', image: 'assets/images/fuusen.png' },
            { emoji: '🥕', answers: ['にんじん', '人参', 'ニンジン'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「に」', hint3: '２文字目は「ん」', image: 'assets/images/ninjin.png' },
            { emoji: '🧅', answers: ['たまねぎ', '玉ねぎ', 'タマネギ'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「た」', hint3: '２文字目は「ま」', image: 'assets/images/tamanegi.png' },
            { emoji: '🦫', answers: ['びーばー', 'ビーバー'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「び」', hint3: '２文字目は「ー」', image: 'assets/images/biibaa.png' },
            { emoji: '🦉', answers: ['ふくろう', 'フクロウ', '梟'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「ふ」', hint3: '２文字目は「く」', image: 'assets/images/fukurou.png' },
            { emoji: '🦋', answers: ['ちょうちょ', '蝶々', 'チョウチョ'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「ち」', hint3: '２文字目は「ょ」', image: 'assets/images/choucho.png' },
            { emoji: '🪚', answers: ['のこぎり', '鋸', 'ノコギリ'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「の」', hint3: '２文字目は「こ」', image: 'assets/images/nokogiri.png' },
            { emoji: '🧲', answers: ['じしゃく', '磁石', 'ジシャク'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「じ」', hint3: '２文字目は「し」', image: 'assets/images/jishaku.png' },
            { emoji: '🧼', answers: ['せっけん', '石鹸', 'セッケン'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「せ」', hint3: '２文字目は「っ」', image: 'assets/images/sekken.png' },
            { emoji: '🧽', answers: ['すぽんじ', 'スポンジ'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「す」', hint3: '２文字目は「ぽ」', image: 'assets/images/suponji.png' },
            { emoji: '🍙', answers: ['おにぎり', 'おむすび'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「お」', hint3: '２文字目は「に」', image: 'assets/images/onigiri.png' },
            { emoji: '🍩', answers: ['どーなつ', 'ドーナツ'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「ど」', hint3: '２文字目は「ー」', image: 'assets/images/doonatsu.png' },
            { emoji: '🫑', answers: ['ぴーまん', 'ピーマン'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「ぴ」', hint3: '２文字目は「ー」', image: 'assets/images/piiman.png' },
            { emoji: '🍯', answers: ['はちみつ', 'ハチミツ', '蜂蜜'], hint1: '〇 〇 〇 〇 (４文字)', hint2: '最初の文字は「は」', hint3: '２文字目は「ち」', image: 'assets/images/hachimitsu.png' }
        ]
    };

    let currentLevel = 1;         // 現在のレベル
    let activeQuestions = [];    // 今遊んでいるランダム抽出された10問
    let currentQuestionIdx = 0;   // 今の問題の番号 (0〜9)
    let correctCount = 0;         // 今のレベルでの正解数 (0〜10)
    let wrongCount = 0;           // 現在の問題の間違い数
    let isListening = false;

    // HTMLの要素を取得
    const levelBadge = document.getElementById('level-badge');
    const progressText = document.getElementById('progress-text');
    const progressBarFill = document.getElementById('progress-bar-fill');
    const illustrationContainer = document.getElementById('illustration-container');
    const statusMessage = document.getElementById('status-message');
    const micBtn = document.getElementById('mic-btn');
    const recognizedWord = document.getElementById('recognized-word');
    const resultContainer = document.getElementById('result-container');
    const hintCard = document.getElementById('hint-card');
    const hintTitle = document.getElementById('hint-title');
    const hintContent = document.getElementById('hint-content');
    const nextBtn = document.getElementById('next-btn');
    const passBtn = document.getElementById('pass-btn');
    const speakQuestionBtn = document.getElementById('speak-question-btn');
    const levelUpModal = document.getElementById('level-up-modal');
    const levelUpText = document.getElementById('level-up-text');
    const startNextLevelBtn = document.getElementById('start-next-level-btn');

    // 配列をランダムにシャッフルし、指定の件数を取り出す関数
    function getRandomQuestions(level, count = 10) {
        const pool = [...questionsPool[level]];
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool.slice(0, count);
    }

    // 音声認識の準備
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add('listening');
            statusMessage.innerText = 'どうぞ、お話しください... 🎙️';
            recognizedWord.innerText = '（きいています）';
            resultContainer.innerHTML = '';
        };

        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('listening');
        };

        recognition.onresult = (event) => {
            const speechResult = event.results[0][0].transcript.trim();
            recognizedWord.innerText = speechResult;
            checkAnswer(speechResult);
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            if (event.error === 'no-speech') {
                statusMessage.innerText = '声が聞き取れませんでした。もう一度押してください。';
            } else {
                statusMessage.innerText = 'マイクが使えません。許可を確認してください。';
            }
            recognizedWord.innerText = '（もう一度試してください）';
        };
    } else {
        statusMessage.innerText = '音声認識に対応していません。Google Chromeをお使いください。';
        micBtn.style.display = 'none';
    }

    // 音声読み上げ機能
    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }
    }

    speakQuestionBtn.addEventListener('click', () => {
        speakText('これ なあに？');
    });

    // 新しいレベルを開始するときの準備
    function startLevel(level) {
        currentLevel = level;
        correctCount = 0;
        currentQuestionIdx = 0;
        activeQuestions = getRandomQuestions(currentLevel, 10);
        loadQuestion();
    }

    // 画面の更新（新しい問題を表示）
    function loadQuestion() {
        const q = activeQuestions[currentQuestionIdx];

        // イラスト表示を更新 (画像優先、なければ絵文字)
        illustrationContainer.innerHTML = '';
        const img = new Image();
        img.src = q.image;
        img.className = 'image-display';
        img.alt = q.answers[0];
        
        img.onload = () => {
            illustrationContainer.appendChild(img);
        };
        img.onerror = () => {
            const emojiDiv = document.createElement('div');
            emojiDiv.className = 'emoji-display';
            emojiDiv.id = 'emoji-display';
            emojiDiv.innerText = q.emojiOverride || q.emoji;
            illustrationContainer.appendChild(emojiDiv);
        };

        // 画面初期化
        recognizedWord.innerText = '（お返事待ち）';
        statusMessage.innerText = 'マイクボタンを押して話してください';
        resultContainer.innerHTML = '';
        hintCard.style.display = 'none';
        nextBtn.style.display = 'none';
        passBtn.style.display = 'none';
        micBtn.style.display = 'inline-flex';
        wrongCount = 0;

        // レベルと進捗の更新
        updateProgressUI();

        // 自動で「これなあに？」と話す
        setTimeout(() => {
            speakText('これ なあに？');
        }, 500);
    }

    // 進捗の表示を更新する
    function updateProgressUI() {
        const levelNames = { 1: 'レベル 1：２文字', 2: 'レベル 2：３文字', 3: 'レベル 3：４文字' };
        levelBadge.innerText = levelNames[currentLevel];
        progressText.innerText = `せいかい： ${correctCount} / 10`;

        const percentage = (correctCount / 10) * 100;
        progressBarFill.style.width = `${percentage}%`;
    }

    // マイクボタンを押したときの動作
    micBtn.addEventListener('click', () => {
        if (!recognition) return;
        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    // 答え合わせのロジック
    function checkAnswer(userSpeech) {
        const q = activeQuestions[currentQuestionIdx];

        // ひらがな・カタカナ・漢字の揺れを許容
        const isCorrect = q.answers.some(ans => {
            return userSpeech.includes(ans) || ans.includes(userSpeech);
        });

        if (isCorrect) {
            // 正解の場合
            resultContainer.innerHTML = '<span class="result-success">🎯 せいかい！ すごい！</span>';
            statusMessage.innerText = 'よくできました！';
            speakText('せいかい！ すごいです！');
            
            correctCount++;
            updateProgressUI();

            if (correctCount >= 10) {
                setTimeout(showLevelUp, 1500);
            } else {
                nextBtn.style.display = 'inline-block';
            }
            hintCard.style.display = 'none';
            passBtn.style.display = 'none';
        } else {
            // 不正解の場合
            wrongCount++;
            resultContainer.innerHTML = '<span style="color: #e74c3c;">おしい！</span>';
            statusMessage.innerText = 'もう一回チャレンジしてみましょう';
            
            hintCard.style.display = 'block';
            
            // 段階的にヒントを出し、3回間違えたらパスボタンを出す
            if (wrongCount === 1) {
                hintTitle.innerText = '💡 第１ヒント';
                hintContent.innerText = q.hint1;
                speakText('第１ヒントです。' + q.hint1.replace(/〇/g, 'まる') + 'です。');
            } else if (wrongCount === 2) {
                hintTitle.innerText = '💡 第２ヒント';
                hintContent.innerText = q.hint2;
                speakText('第２ヒントです。' + q.hint2);
            } else {
                hintTitle.innerText = '💡 第３ヒント';
                hintContent.innerText = q.hint3;
                speakText('第３ヒントです。' + q.hint3);
                // 3回目以降の間違いで、パス（答えを見る）ボタンを出す
                passBtn.style.display = 'inline-block';
            }
        }
    }

    // パス（答えを見る）ボタンを押したときの処理
    passBtn.addEventListener('click', () => {
        const q = activeQuestions[currentQuestionIdx];
        const answerText = q.answers[0]; // ひらがなの答え

        // 答えを表示する
        resultContainer.innerHTML = `<span class="result-info">答えは 「${answerText}」 です 🔑</span>`;
        statusMessage.innerText = '答えを確認して、次に進みましょう';
        speakText(`こたえは、 ${answerText} です。`);

        // マイクボタンとパスボタンを隠し、次へ進むボタンを出す
        micBtn.style.display = 'none';
        passBtn.style.display = 'none';
        hintCard.style.display = 'none';
        nextBtn.style.display = 'inline-block';
    });

    // レベルアップのお祝い画面を出す
    function showLevelUp() {
        levelUpModal.classList.add('show');
        
        if (currentLevel < 3) {
            const nextLevel = currentLevel + 1;
            const targetCharCount = nextLevel === 2 ? '３文字' : '４文字';
            levelUpText.innerHTML = `おめでとうございます！🎉<br>レベル ${currentLevel} をクリアしました！<br>次は ${targetCharCount} の言葉に挑戦しましょう！`;
            speakText('レベルアップ！おめでとうございます！つぎは' + targetCharCount + 'の言葉に挑戦しましょう！');
        } else {
            levelUpText.innerHTML = `おめでとうございます！🎉🎉<br>すべてのレベルをクリアしました！<br>すばらしいリハビリでしたね！`;
            speakText('おめでとうございます！すべてのレベルをクリアしました！素晴らしいリハビリでした！');
            startNextLevelBtn.innerText = 'もういちど最初からあそぶ 🔄';
        }
    }

    // レベルアップ画面の「次へすすむ」ボタンを押したとき
    startNextLevelBtn.addEventListener('click', () => {
        levelUpModal.classList.remove('show');
        
        if (currentLevel < 3) {
            startLevel(currentLevel + 1);
        } else {
            startLevel(1);
        }
    });

    // 「つぎへすすむ」ボタンを押したとき
    nextBtn.addEventListener('click', () => {
        currentQuestionIdx = (currentQuestionIdx + 1) % activeQuestions.length;
        loadQuestion();
    });

    // 最初に画面を開いたときの処理
    window.onload = () => {
        startLevel(1);
    };
</script>
